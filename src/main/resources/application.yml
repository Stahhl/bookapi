graphql:
  packages:
    - "com.stahhl.bookapi.graphql"
  graphiql:
    enabled: true

spring:
  application:
    name: bookapi
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

bookapi:
  upload:
    cover:
      directory: ${java.io.tmpdir}/bookapi/covers
      max-bytes: 5242880
      ttl-hours: 24
      test-ui:
        enabled: false
