<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cover Upload Test UI</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #f7f7f9;
        color: #222;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }
      .note {
        background: #fff8e1;
        border: 1px solid #f0d37a;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
      }
      input, textarea {
        margin-top: 6px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }
      textarea {
        min-height: 90px;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        padding: 11px 14px;
        background: #0066cc;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: default;
      }
      pre {
        margin-top: 16px;
        background: #111;
        color: #d8f7d8;
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Cover Upload Test UI</h1>
      <div class="note">
        Internal test utility. Upload is performed via REST, then attach is performed via GraphQL.
      </div>

      <form id="cover-form">
        <label for="book-id">Book ID</label>
        <input id="book-id" name="book-id" required placeholder="11111111-1111-1111-1111-111111111111">

        <label for="description">Cover Description</label>
        <textarea id="description" name="description" required placeholder="Front cover art"></textarea>

        <label for="file">Image File</label>
        <input id="file" name="file" type="file" accept="image/*" required>

        <button id="submit" type="submit">Upload And Attach Cover</button>
      </form>

      <pre id="output">Ready.</pre>
    </div>

    <script>
      const form = document.getElementById("cover-form");
      const submit = document.getElementById("submit");
      const output = document.getElementById("output");

      function setOutput(value) {
        output.textContent = value;
      }

      async function uploadFile(file) {
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("/api/uploads/book-covers", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error("Upload failed (" + response.status + "): " + text);
        }

        return await response.json();
      }

      async function attachCover(bookId, uploadId, description) {
        const query = `
          mutation AttachBookCover($bookId: BookId!, $uploadId: BookId!, $description: String!) {
            attachBookCover(bookId: $bookId, uploadId: $uploadId, description: $description) {
              id
              title
              coverDescription
              coverContentType
              coverUrl
            }
          }
        `;

        const response = await fetch("/graphql", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            variables: {
              bookId,
              uploadId,
              description
            }
          })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error("GraphQL request failed (" + response.status + "): " + text);
        }

        const body = await response.json();
        if (body.errors && body.errors.length > 0) {
          throw new Error("GraphQL errors: " + JSON.stringify(body.errors, null, 2));
        }
        return body.data.attachBookCover;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        setOutput("Uploading file...");

        try {
          const bookId = document.getElementById("book-id").value.trim();
          const description = document.getElementById("description").value.trim();
          const file = document.getElementById("file").files[0];

          if (!file) {
            throw new Error("Please choose an image file.");
          }

          const uploadResult = await uploadFile(file);
          setOutput("Upload complete. uploadId=" + uploadResult.uploadId + "\nAttaching cover...");

          const attachResult = await attachCover(bookId, uploadResult.uploadId, description);
          setOutput(
            "Success.\n\nUpload:\n" +
            JSON.stringify(uploadResult, null, 2) +
            "\n\nAttach Result:\n" +
            JSON.stringify(attachResult, null, 2)
          );
        } catch (error) {
          setOutput("Error:\n" + (error && error.message ? error.message : String(error)));
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
